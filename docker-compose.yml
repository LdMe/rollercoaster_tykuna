services:

  db:
    image: postgres:latest
    container_name: roller_postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - rollercoaster_data:/var/lib/postgresql/18/docker
      - ./db/scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - postgres-network
      
networks:
  postgres-network:
    external: true
volumes:
  rollercoaster_data: