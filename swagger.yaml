openapi: 3.0.0
info:
  title: API Parque de Atracciones
  version: 1.0.0
  description: Documentación completa de los endpoints para la gestión de usuarios, categorías y atracciones.
  
servers:
  - url: /api
    description: Servidor principal

# Definimos el esquema de seguridad global (JWT)
# Esto aplicará a todas las rutas por defecto, a menos que se sobreescriba con security: []
security:
  - bearerAuth: []

paths:
  # ---------------------------------------------------------
  # RUTAS DE AUTENTICACIÓN (AUTH)
  # ---------------------------------------------------------
  /auth/register:
    post:
      summary: Registrar un nuevo usuario
      tags: [Auth]
      description: Crea una cuenta de usuario nueva.
      security: [] # Esta ruta NO requiere token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Usuario registrado con éxito.
        '400':
          description: Datos de registro incorrectos o incompletos.

  /auth/login:
    post:
      summary: Iniciar sesión
      tags: [Auth]
      description: Autentica a un usuario mediante email y contraseña, devolviendo un token JWT.
      security: [] # Esta ruta NO requiere token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login exitoso. Devuelve el token JWT.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          description: Credenciales inválidas o incompletas.
        '401':
          description: Contraseña incorrecta o usuario no encontrado.

  # ---------------------------------------------------------
  # RUTAS DE CATEGORÍAS (RIDE CATEGORIES)
  # ---------------------------------------------------------
  /ride-categories:
    get:
      summary: Obtener todas las categorías
      tags: [Ride Categories]
      description: Devuelve una lista de todas las categorías de atracciones. Requiere token JWT.
      responses:
        '200':
          description: Lista de categorías obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RideCategory'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      summary: Crear una nueva categoría
      tags: [Ride Categories]
      description: Crea una nueva categoría para las atracciones. Requiere token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RideCategoryInput'
      responses:
        '201':
          description: Categoría creada con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideCategory'
        '400':
          description: Error de validación en los datos enviados.
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /ride-categories/{id}:
    get:
      summary: Obtener una categoría por su ID
      tags: [Ride Categories]
      description: Obtiene el detalle de una categoría específica. Requiere token JWT.
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la categoría.
          schema:
            type: integer
      responses:
        '200':
          description: Categoría encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideCategory'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Categoría no encontrada.

    put:
      summary: Actualizar una categoría
      tags: [Ride Categories]
      description: Modifica los datos de una categoría existente. Requiere token JWT.
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la categoría a actualizar.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RideCategoryInput'
      responses:
        '200':
          description: Categoría actualizada correctamente.
        '400':
          description: Error de validación.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Categoría no encontrada.

    delete:
      summary: Eliminar una categoría
      tags: [Ride Categories]
      description: Elimina una categoría de la base de datos de forma permanente. Requiere token JWT.
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la categoría a eliminar.
          schema:
            type: integer
      responses:
        '204':
          description: Categoría eliminada correctamente (sin contenido).
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Categoría no encontrada.

  # ---------------------------------------------------------
  # RUTAS DE ATRACCIONES (RIDES)
  # ---------------------------------------------------------
  /rides:
    get:
      summary: Obtener todas las atracciones
      tags: [Rides]
      description: Devuelve una lista de todas las atracciones del parque. Requiere token JWT.
      responses:
        '200':
          description: Lista de atracciones obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ride'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      summary: Crear una nueva atracción
      tags: [Rides]
      description: Crea una atracción nueva. Requiere token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RideInput'
      responses:
        '201':
          description: Atracción creada con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ride'
        '400':
          description: Error de validación en los datos enviados.
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /rides/{id}:
    get:
      summary: Obtener una atracción por su ID
      tags: [Rides]
      description: Obtiene el detalle de una atracción específica. **Requiere rol de 'admin'** y token JWT.
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la atracción.
          schema:
            type: integer
      responses:
        '200':
          description: Atracción encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ride'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Prohibido. El usuario no tiene el rol 'admin'.
        '404':
          description: Atracción no encontrada.

    put:
      summary: Actualizar una atracción
      tags: [Rides]
      description: Reemplaza o actualiza los datos de una atracción existente. Requiere token JWT.
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la atracción a actualizar.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RideInput'
      responses:
        '200':
          description: Atracción actualizada correctamente.
        '400':
          description: Error de validación.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Atracción no encontrada.

    delete:
      summary: Eliminar una atracción
      tags: [Rides]
      description: Elimina una atracción de la base de datos de forma permanente. Requiere token JWT.
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la atracción a eliminar.
          schema:
            type: integer
      responses:
        '204':
          description: Atracción eliminada correctamente (sin contenido).
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Atracción no encontrada.

  /rides/{id}/status:
    patch:
      summary: Actualizar el estado de una atracción
      tags: [Rides]
      description: Cambia únicamente el estado (open, closed, testing) de una atracción. Requiere token JWT.
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la atracción.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [open, closed, testing]
              required:
                - status
      responses:
        '200':
          description: Estado actualizado correctamente.
        '400':
          description: Estado inválido.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Atracción no encontrada.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Introduce tu token JWT aquí para autenticar las peticiones.

  responses:
    UnauthorizedError:
      description: No autorizado. Token JWT faltante o inválido.

  schemas:
    # ---------------------------------------------------------
    # ESQUEMAS DE ATRACCIONES (RIDES)
    # ---------------------------------------------------------
    Ride:
      type: object
      properties:
        id:
          type: integer
          description: Identificador autoincremental de la atracción.
          example: 1
        categoryId:
          type: integer
          example: 1
        name:
          type: string
          description: Nombre de la atracción.
          example: "Montaña Rusa"
        creationDate:
          type: string
          format: date
          description: Fecha de creación de la atracción.
          example: "2022-01-01"
        durationSeconds:
          type: integer
          minimum: 10
          description: Duración en segundos (mínimo 10).
          example: 60
        minAge:
          type: integer
          description: Edad mínima recomendada.
          example: 10
        minHeight:
          type: integer
          description: Altura mínima requerida en cm.
          example: 120
        status:
          type: string
          enum: [open, closed, testing]
          description: Estado actual de la atracción.
          example: "open"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RideInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Montaña Rusa"
        categoryId:
          type: integer
          example: 1
        creationDate:
          type: string
          format: date
          example: "2022-01-01"
        durationSeconds:
          type: integer
          minimum: 10
          example: 60
        minAge:
          type: integer
          example: 10
        minHeight:
          type: integer
          example: 120
        status:
          type: string
          enum: [open, closed, testing]
          default: closed
          example: "open"

    # ---------------------------------------------------------
    # ESQUEMAS DE CATEGORÍAS
    # ---------------------------------------------------------
    RideCategory:
      type: object
      properties:
        id:
          type: integer
          description: Identificador autoincremental.
          example: 1
        name:
          type: string
          description: Nombre de la categoría.
          example: "Montaña Rusa"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RideCategoryInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Montaña Rusa"

    # ---------------------------------------------------------
    # ESQUEMAS DE AUTENTICACIÓN Y USUARIO
    # ---------------------------------------------------------
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Juan Pérez"
        dateOfBirth:
          type: string
          format: date
          example: "1990-05-15"
        role:
          type: string
          enum: [worker, admin]
          example: "worker"
        email:
          type: string
          format: email
          example: "juan@ejemplo.com"
        phone:
          type: string
          example: "+34 600 123 456"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterInput:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: "Juan Pérez"
        email:
          type: string
          format: email
          example: "juan@ejemplo.com"
        password:
          type: string
          format: password
          example: "MiSuperClave123!"
        dateOfBirth:
          type: string
          format: date
          example: "1990-05-15"
        role:
          type: string
          enum: [worker, admin]
          default: "worker"
          example: "worker"
        phone:
          type: string
          example: "+34 600 123 456"

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "juan@ejemplo.com"
        password:
          type: string
          format: password
          example: "MiSuperClave123!"